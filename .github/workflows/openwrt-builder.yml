name: OpenWrt Builder

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device to build (all = every device)'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - r2s
          - r3s
          - r5s
          - r5s-outdoor
          - r68s
          - x86
      openwrt_tag:
        description: 'ImmortalWRT tag to checkout (e.g., v24.10.6)'
        required: false
        default: 'v24.10.6'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  OPENWRT_TAG: ${{ github.event.inputs.openwrt_tag }}
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  # ---------------------------------------------------------------------------
  # prepare: 把 workflow_dispatch 的 device choice 翻译成动态 matrix JSON
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: set-matrix
        env:
          # 经 env 注入而非直接插值, 杜绝表达式注入 (device 虽是 choice 受限枚举)
          INPUT_DEVICE: ${{ github.event.inputs.device }}
        run: |
          ALL='["r2s","r3s","r5s","r5s-outdoor","r68s","x86"]'
          # INPUT_DEVICE 为空仅出现在非 UI 触发(如 API)未带 input 时, 回退全量
          if [ -z "$INPUT_DEVICE" ] || [ "$INPUT_DEVICE" = "all" ]; then
            MATRIX="$ALL"
          else
            MATRIX="[\"$INPUT_DEVICE\"]"
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Build matrix: $MATRIX"

  # ---------------------------------------------------------------------------
  # build: 每个设备一个并行 job; DEVICE 注入 job 级 env, 全 step 可见
  # ---------------------------------------------------------------------------
  build:
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      DEVICE: ${{ matrix.device }}

    steps:
    - name: "Optimize Disk Space"
      uses: "hugoalh/disk-space-optimizer-ghaction@v0.8.1"
      with:
        operate_sudo: "True"
        general_include: ".+"
        general_exclude: |-
          ^GCC$
          ^G\+\+$
          Clang
          LLVM
        docker_include: ".+"
        docker_prune: "True"
        docker_clean: "True"
        apt_prune: "True"
        apt_clean: "True"
        homebrew_prune: "True"
        homebrew_clean: "True"
        npm_prune: "True"
        npm_clean: "True"
        os_swap: "True"

    - name: Move /home/runner/ to /mnt/ and create symlink
      run: |
        sudo mv /home/runner /mnt/
        sudo ln -s /mnt/runner /home/runner

    - name: Checkout
      uses: actions/checkout@main

    - name: Setup Environment and Dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        echo "Setting up Environment and Dependencies..."
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

        # 在/mnt下创建workdir以使用更大的磁盘空间
        sudo mkdir -p /mnt/workdir
        sudo ln -s /mnt/workdir /workdir
        sudo chown $USER:$GROUPS /mnt/workdir

        sudo pip install packaging
        echo "Checking Disk Space..."
        df -hT
        echo "Checking working directory location:"
        ls -la /workdir
        echo "Checking GCC version..."
        gcc --version
        echo "Checking CPU details..."
        lscpu

    - name: Clone openwrt source code
      working-directory: /workdir
      run: |
        # Clone ImmortalWRT with shallow clone for faster download
        git clone $REPO_URL -b $REPO_BRANCH openwrt --depth=1
        cd openwrt
        # Checkout specific tag if provided
        if [ -n "${{ env.OPENWRT_TAG }}" ]; then
          echo "Checking out tag: ${{ env.OPENWRT_TAG }}"
          git fetch --depth=1 origin tag ${{ env.OPENWRT_TAG }}
          git checkout tags/${{ env.OPENWRT_TAG }}
        else
          echo "No tag specified, using latest from branch: $REPO_BRANCH"
        fi
        # Export tag for cache key
        echo "OPENWRT_TAG=${{ env.OPENWRT_TAG }}" >> $GITHUB_ENV
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Assemble seed configuration (common + device)
      run: |
        # 拼装契约: common.config + devices/$DEVICE/seed.config = .config
        COMMON="config/common.config"
        SEED="devices/$DEVICE/seed.config"
        if [ ! -f "$COMMON" ]; then
          echo "ERROR: $COMMON not found"; exit 1
        fi
        if [ ! -f "$SEED" ]; then
          echo "ERROR: device seed not found: $SEED (device=$DEVICE)"; exit 1
        fi
        cat "$COMMON" "$SEED" > "$CONFIG_FILE"
        echo "Assembled .config for device '$DEVICE' ($(wc -l < $CONFIG_FILE) lines)"

        # Extract version info from seed BEFORE moving (defconfig may alter format)
        VERSION_DIST=$(grep 'CONFIG_VERSION_DIST=' $CONFIG_FILE | cut -d'"' -f2)
        VERSION_NUMBER=$(grep 'CONFIG_VERSION_NUMBER=' $CONFIG_FILE | cut -d'"' -f2)
        VERSION_CODE=$(grep 'CONFIG_VERSION_CODE=' $CONFIG_FILE | cut -d'"' -f2)
        echo "VERSION_DIST=$VERSION_DIST" >> $GITHUB_ENV
        echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_ENV
        echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
        echo "Extracted version: ${VERSION_DIST}-${VERSION_NUMBER}-${VERSION_CODE}"

    - name: Cache OpenWrt dl & ccache
      uses: actions/cache@v4
      with:
        # 只缓存 dl(源码包, 跨设备复用) 与 ccache(toolchain 加速)。
        # build_dir/staging_dir 单设备即 15-20GB, 超 GitHub 10GB 全局上限,
        # 会触发 LRU 雪崩把高价值 dl 挤出, 故不缓存编译中间产物。
        path: |
          openwrt/dl
          openwrt/.ccache
        # dl 读共享写隔离: 保存按设备隔离, 恢复用宽前缀跨设备复用
        key: openwrt-${{ env.OPENWRT_TAG }}-${{ matrix.device }}-${{ hashFiles(format('devices/{0}/seed.config', matrix.device), 'config/common.config') }}
        restore-keys: |
          openwrt-${{ env.OPENWRT_TAG }}-${{ matrix.device }}-
          openwrt-${{ env.OPENWRT_TAG }}-
          openwrt-

    - name: Load custom feeds/drivers
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        mkdir -p $GITHUB_WORKSPACE/drivers/;mkdir -p openwrt/package/kernel/drivers/
        mv $GITHUB_WORKSPACE/drivers/* openwrt/package/kernel/ || true
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Apply system customization (diy-part2)
      run: |
        [ -e files ] && mv files openwrt/files
        mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Expand seed config and download packages
      id: package
      run: |
        cd openwrt
        echo "Expanding seed config with make defconfig..."
        make defconfig
        echo "Full config lines: $(wc -l < .config)"
        make download -j8
        # 清理 make download 产生的残缺包 (<1KB 的错误页/截断下载)。
        # 关键: 限定 -maxdepth 1 -type f 只清 dl/ 顶层下载包, 不可递归进
        # dl/go-mod-cache/ —— 后者含大量合法的小 .go 源文件 (如 frp 依赖的
        # fatedier/golib/errors/errors.go 800B), 误删会导致 go 离线编译报
        # "no required module provides package", frp [host] 编译失败。
        find dl -maxdepth 1 -type f -size -1024c -exec ls -l {} \;
        find dl -maxdepth 1 -type f -size -1024c -exec rm -f {} \;

    - name: Preinstall clash core
      run: |
        cd openwrt

        # Check OpenClash location (ImmortalWRT: feeds/packages, coolsnowwolf: feeds/small)
        ls -l feeds/packages/net/openclash || ls -l feeds/luci/applications/luci-app-openclash || true
        mkdir -p files/etc/openclash/core/

        # 按目标架构选 Clash 核心: 探测 .config 的 TARGET 符号, 不再依赖分支名
        if grep -q '^CONFIG_TARGET_x86=y' .config; then
          CLASH_ARCH="amd64"
        else
          # rockchip_armv8 (r2s/r3s/r5s/r5s-outdoor/r68s) 全部 arm64
          CLASH_ARCH="arm64"
        fi
        CLASH_CORE_URL="https://raw.githubusercontent.com/vernesong/OpenClash/core/master/meta/clash-linux-${CLASH_ARCH}.tar.gz"
        echo "Device=$DEVICE -> Clash core arch=$CLASH_ARCH"

        # 下载并解压 Clash 核心
        curl -sL -m 30 --retry 2 "$CLASH_CORE_URL" -o /tmp/clash.tar.gz
        tar zxvf /tmp/clash.tar.gz -C /tmp

        # 赋予执行权限并移动核心文件到目标目录
        chmod +x /tmp/clash
        mv /tmp/clash files/etc/openclash/core/clash_meta

        # 清理临时文件
        rm -rf /tmp/clash.tar.gz

        # 下载 GeoIP 数据库文件并移动到目标目录
        curl -sL -m 30 --retry 2 https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat -o /tmp/GeoIP.dat
        mv /tmp/GeoIP.dat files/etc/openclash/GeoIP.dat

        # 下载 GeoSite 数据库文件并移动到目标目录
        curl -sL -m 30 --retry 2 https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat -o /tmp/GeoSite.dat
        mv /tmp/GeoSite.dat files/etc/openclash/GeoSite.dat

        # 列出核心目录内容，确认文件是否正确放置
        ls -l files/etc/openclash
        ls -l files/etc/openclash/core

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        make defconfig
        export MAKE="gmake"
        echo -e "$(nproc) thread compile with MAKE: $MAKE"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        TARGET_DIRS=$(find openwrt/bin/targets -mindepth 2 -maxdepth 2 -type d)
        NUM_DIRS=$(echo "$TARGET_DIRS" | grep -c .) # Count non-empty lines

        if [ "$NUM_DIRS" -eq 0 ]; then
          echo "Error: Could not find any target directory in openwrt/bin/targets/*/*"
          exit 1
        fi

        FIRST_DIR=$(echo "$TARGET_DIRS" | head -n 1)
        if [ "$NUM_DIRS" -gt 1 ]; then
          echo "Warning: Found multiple target directories. Using the first one found ($FIRST_DIR):"
          echo "$TARGET_DIRS"
        fi

        cd "$FIRST_DIR"
        echo "Changed directory to $PWD"
        rm -rf packages

        # Rename firmware files with version prefix (from env vars set in seed config step)
        VERSION_PREFIX="${VERSION_DIST}-${VERSION_NUMBER}-${VERSION_CODE}"
        echo "Version prefix: $VERSION_PREFIX"

        if [ "$VERSION_PREFIX" = "--" ]; then
          echo "Warning: VERSION info not found in seed config, skipping rename"
        else
          for file in immortalwrt-*; do
            if [ -f "$file" ]; then
              NEW_NAME="${VERSION_PREFIX}-${file#immortalwrt-}"
              mv -- "$file" "$NEW_NAME"
              echo "Renamed: $file -> $NEW_NAME"
            fi
          done
        fi

        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      env:
        DEVICE: ${{ matrix.device }}
      run: |
        # release tag 沿用旧格式: {设备名}-YYYY.MM.DD-HHMM (Never break userspace)
        RELEASE_TAG="${DEVICE}-$(date +"%Y.%m.%d-%H%M")"
        echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
        echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
        touch release.txt
        echo "## OpenWrt Firmware for ${DEVICE}" >> release.txt
        echo "Built on: $(date +"%Y-%m-%d %H:%M:%S")" >> release.txt
        echo "Device: ${DEVICE}" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases by device
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
        DEVICE: ${{ matrix.device }}
        CURRENT_RELEASE_TAG: ${{ env.RELEASE_TAG }}
      run: |
        # 按设备前缀清理旧 release, 每设备保留 2 个(1 旧 + 刚建的新)。
        # 6 个 job 并发到终点会撞 GitHub secondary rate limit,
        # 故所有 API 删除调用走带指数退避的 retry 封装。
        echo "Device: $DEVICE"
        echo "Current release tag (excluded from deletion): $CURRENT_RELEASE_TAG"

        # 带退避重试的 DELETE: 遇 403/429(限流) 退避重试, 最多 5 次
        api_delete() {
          local url="$1" attempt=0 code
          while [ "$attempt" -lt 5 ]; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: token $GH_TOKEN" "$url")
            case "$code" in
              2*) return 0 ;;
              403|429) sleep $(( (attempt + 1) * 5 )); attempt=$((attempt + 1)) ;;
              *) echo "  DELETE $url -> HTTP $code (giving up)"; return 1 ;;
            esac
          done
          echo "  DELETE $url -> rate-limited after retries"; return 1
        }

        # 仅匹配本设备的 release, 排除刚创建的, 按时间倒序。
        # 关键: tag 格式为 {device}-YYYY.MM.DD-HHMM, 用 "设备名 + '-' + 4位年份"
        # 正则精确锚定。裸 startswith("r5s-") 会误吞 "r5s-outdoor-..." (前缀包含),
        # 而 "^r5s-[0-9]{4}\\." 不匹配 "r5s-outdoor-2026..." (o 不是数字)。
        RELEASES=$(curl -s -H "Authorization: token $GH_TOKEN" \
          "https://api.github.com/repos/$REPO/releases" | \
          jq -r --arg DEV "$DEVICE" --arg CURRENT "$CURRENT_RELEASE_TAG" \
            '[.[] | select(.tag_name | test("^" + $DEV + "-[0-9]{4}\\.")) | select(.tag_name != $CURRENT) | {id, tag_name, created_at}] | sort_by(.created_at) | reverse')

        TOTAL=$(echo "$RELEASES" | jq length)
        TO_KEEP=1
        TO_DELETE=$((TOTAL - TO_KEEP))

        if [ "$TO_DELETE" -gt 0 ]; then
          echo "Found $TOTAL old releases for '$DEVICE', keeping $TO_KEEP, deleting $TO_DELETE"
          DELETE_IDS=$(echo "$RELEASES" | jq -r ".[${TO_KEEP}:] | .[].id")
          DELETE_TAGS=$(echo "$RELEASES" | jq -r ".[${TO_KEEP}:] | .[].tag_name")

          for ID in $DELETE_IDS; do
            echo "Deleting release ID: $ID"
            api_delete "https://api.github.com/repos/$REPO/releases/$ID"
          done
          for TAG in $DELETE_TAGS; do
            echo "Deleting tag: $TAG"
            api_delete "https://api.github.com/repos/$REPO/git/refs/tags/$TAG"
          done
        else
          echo "Found $TOTAL old releases for '$DEVICE', keeping all (<= $TO_KEEP)"
        fi
